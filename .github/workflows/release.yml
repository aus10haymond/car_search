name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: dashboard/frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('dashboard/frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: dashboard/frontend
        run: npm ci

      - name: Build Tauri app (release)
        working-directory: dashboard/frontend
        run: npx @tauri-apps/cli build

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dashboard/frontend/src-tauri/target/release/bundle/nsis/*.exe
            dashboard/frontend/src-tauri/target/release/bundle/msi/*.msi
