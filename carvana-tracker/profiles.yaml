# Carvana Tracker — Search Profiles
#
# Each profile runs an independent search and sends results to its own recipients.
# Add as many profiles as needed. Each must have a unique profile_id.
#
# Required fields per profile:
#   profile_id        — short slug used internally (letters, numbers, underscores)
#   label             — display name shown in email subject and body
#   vehicles          — list of [make, model] pairs to search
#   max_price         — upper price limit in dollars (optional — omit or set to null for no limit)
#   max_mileage       — upper mileage limit
#   min_year          — earliest model year to include
#   max_year          — latest model year to include
#   email_to          — list of recipient email addresses
#
# Optional fields:
#   fuel_type_filters  — list of fuel types to search: Hybrid, Gas, or null (all).
#                        Defaults to [null] (no fuel filter) if omitted.
#   model_preference   — models listed best→worst; drives sort order and score bonus.
#                        Omit for no preference (pure value-score ranking).
#   reference_doc_path — path to a markdown file with vehicle context for the LLM.
#                        If omitted, the LLM evaluates on listing data alone.

profiles:
